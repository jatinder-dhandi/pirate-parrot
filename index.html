<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1a0f14" />
<title>Pirate Parrot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2a1a12;
  --parchment:#f6e7c6;
  --parchment-deep:#e8d3a4;
  --rope:#a96a2f;
  --rum:#c0392b;
  --rum-deep:#8f2418;
  --sea:#0e5e74;
  --gold:#f3b62b;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;background:#1a0f14;
  font-family:"Nunito",system-ui,Avenir,sans-serif;-webkit-font-smoothing:antialiased;
  touch-action:none;overscroll-behavior:none;}
#game{display:block;width:100vw;height:100vh;}
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:24px;text-align:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .35s;}
.overlay.show{opacity:1;pointer-events:auto;}
.scroll{
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,255,255,.35), transparent 50%),
    linear-gradient(175deg, var(--parchment), var(--parchment-deep));
  border:3px solid var(--ink);
  border-radius:14px;
  box-shadow:0 0 0 6px var(--rope), 0 0 0 9px var(--ink), 0 28px 60px rgba(0,0,0,.55);
  padding:30px 38px;max-width:560px;width:100%;color:var(--ink);position:relative;
  max-height:92vh;overflow-y:auto;
}
.scroll::before,.scroll::after{
  content:"";position:absolute;width:34px;height:34px;border:3px solid var(--ink);
  border-radius:50%;background:var(--gold);
  box-shadow:inset 0 -5px 0 rgba(0,0,0,.22);
}
.scroll::before{top:-17px;left:-17px;}
.scroll::after{bottom:-17px;right:-17px;}
h1{font-family:"Pirata One",cursive;font-weight:400;letter-spacing:1px;
  font-size:clamp(44px,8vw,72px);line-height:.9;margin:0 0 4px;}
h1 .r{color:var(--rum);}
.sub{font-weight:700;font-size:clamp(13px,2.3vw,16px);margin:0 0 16px;color:#5a3a22;}
.keys{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px;margin:0 0 18px;text-align:left;}
.keys .row{display:flex;align-items:center;gap:9px;font-weight:800;font-size:13px;}
kbd{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;
  padding:0 7px;border-radius:7px;background:#fffaf0;border:2px solid var(--ink);
  box-shadow:0 3px 0 var(--ink);font-family:inherit;font-weight:800;font-size:12px;}
.modes{display:flex;flex-direction:column;gap:11px;margin-top:6px;}
.mode{appearance:none;cursor:pointer;text-align:left;border:3px solid var(--ink);
  border-radius:12px;padding:12px 16px;background:var(--parchment);color:var(--ink);
  box-shadow:0 5px 0 var(--ink);transition:transform .06s, box-shadow .06s;}
.mode:hover{transform:translateY(-1px);}
.mode:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
.mode .mt{font-family:"Pirata One",cursive;font-size:26px;line-height:1;display:block;}
.mode .md{font-weight:700;font-size:12.5px;color:#5a3a22;display:block;margin-top:3px;}
.mode.cake{background:#f3ead1;}
.mode.cake .mt{color:#2e7d32;}
.mode.talkin .mt{color:var(--rum);}
.mode.fu{background:#e7ddc4;}
.mode.fu .mt{color:#5b3a8a;}
.btn{appearance:none;border:3px solid var(--ink);cursor:pointer;background:var(--rum);
  color:#fff7ea;font-family:"Pirata One",cursive;font-size:24px;letter-spacing:1px;
  padding:11px 30px;border-radius:12px;box-shadow:0 6px 0 var(--rum-deep);
  transition:transform .06s, box-shadow .06s;margin:6px 6px 0;}
.btn.ghost{background:var(--parchment);color:var(--ink);box-shadow:0 6px 0 var(--ink);}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--rum-deep);}
.btn.ghost:active{box-shadow:0 2px 0 var(--ink);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:0 6px 0 var(--rum-deep);}
.btn:disabled:hover{transform:none;}
.btn.small{font-size:18px;padding:9px 22px;margin-top:14px;}
.score-label{font-weight:800;letter-spacing:3px;text-transform:uppercase;font-size:12px;
  color:#5a3a22;margin:0;}
.score-big{font-family:"Pirata One",cursive;font-size:clamp(64px,16vw,128px);color:var(--rum);
  line-height:.85;margin:4px 0 0;}
.bestline{font-weight:800;font-size:14px;color:#5a3a22;margin:6px 0 0;}
.bestline.new{color:#2e7d32;}
.modeline{font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#7a4a22;margin:2px 0 0;}
.verdict{font-weight:800;font-size:clamp(14px,2.5vw,18px);margin:14px 0 18px;}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;
  align-items:flex-start;gap:6px;pointer-events:none;opacity:0;transition:opacity .3s;
  padding:calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 10px calc(12px + env(safe-area-inset-left));}
#hud.show{opacity:1;}
.pill{background:var(--parchment);border:3px solid var(--ink);border-radius:10px;
  padding:5px 11px;font-weight:800;color:var(--ink);font-size:18px;
  box-shadow:0 4px 0 var(--ink);display:flex;flex-direction:column;align-items:center;
  gap:1px;line-height:1.05;}
.pill .tag{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#7a4a22;}
#missPill #missDots{letter-spacing:3px;font-size:18px;}
#missPill.danger #missDots{color:var(--rum);animation:pulse .5s ease-in-out infinite;}
@keyframes pulse{50%{transform:scale(1.15);}}
.tip{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:6;
  background:rgba(26,15,20,.92);color:var(--parchment);font-weight:800;padding:8px 18px;
  border-radius:999px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;}
.tip.show{opacity:1;}
.toast{position:fixed;left:50%;top:70px;transform:translateX(-50%);z-index:6;
  background:rgba(26,15,20,.92);color:var(--parchment);font-weight:800;padding:7px 16px;
  border-radius:999px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
.cornerbtn{position:fixed;z-index:7;border:3px solid var(--ink);border-radius:12px;
  background:rgba(246,231,198,.92);color:var(--ink);font-weight:800;font-size:14px;
  padding:8px 16px;box-shadow:0 4px 0 var(--ink);cursor:pointer;display:none;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  transition:transform .06s, box-shadow .06s;}
.cornerbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
.cornerbtn.on{display:block;}
#pauseBtn{right:14px;bottom:calc(14px + env(safe-area-inset-bottom));}
#sndbar{position:fixed;left:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:7;display:none;}
#sndbar.on{display:block;}
.sbtn{appearance:none;cursor:pointer;border:3px solid var(--ink);border-radius:12px;
  background:rgba(246,231,198,.92);color:var(--ink);font-weight:800;font-size:14px;
  padding:8px 16px;box-shadow:0 4px 0 var(--ink);min-width:104px;text-align:center;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  transition:transform .06s, box-shadow .06s;}
.sbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
.sbtn.off{background:rgba(176,164,146,.55);color:#7a6a55;}
#pauseOverlay{position:fixed;inset:0;z-index:8;display:none;align-items:center;justify-content:center;
  background:rgba(12,8,14,.62);cursor:pointer;-webkit-tap-highlight-color:transparent;}
#pauseOverlay.show{display:flex;}
.pausebox{display:flex;flex-direction:column;align-items:center;gap:16px;color:var(--parchment);}
.pauseicon{display:flex;gap:22px;}
.pauseicon span{display:block;width:36px;height:120px;border-radius:12px;background:var(--parchment);
  box-shadow:0 0 0 5px rgba(0,0,0,.4);}
.pauseword{font-family:"Pirata One",cursive;font-size:clamp(48px,12vw,80px);line-height:1;}
.pausehint{font-weight:800;font-size:15px;opacity:.85;}
.namebox{margin:2px 0 14px;text-align:left;}
.namebox label{display:block;font-weight:800;font-size:13px;color:#5a3a22;margin:0 0 5px;letter-spacing:.5px;}
.namebox input{width:100%;border:3px solid var(--ink);border-radius:10px;background:#fffaf0;color:var(--ink);
  font-family:inherit;font-weight:800;font-size:16px;padding:9px 12px;box-shadow:0 3px 0 var(--ink);outline:none;}
.namebox input:focus{background:#fff;}
@media (max-width:560px){
  .overlay{padding:16px;}
  .scroll{padding:22px 20px;border-radius:12px;box-shadow:0 0 0 5px var(--rope),0 0 0 8px var(--ink),0 18px 40px rgba(0,0,0,.55);}
  .scroll::before,.scroll::after{width:26px;height:26px;}
  .scroll::before{top:-13px;left:-13px;}
  .scroll::after{bottom:-13px;right:-13px;}
  .sub{font-size:13px;margin-bottom:14px;}
  .pill{font-size:15px;padding:4px 9px;}
  .pill .tag{font-size:8px;letter-spacing:.5px;}
  #missPill #missDots{font-size:15px;}
  .mode{padding:11px 14px;}
  .mode .mt{font-size:23px;}
  .btn{font-size:22px;padding:10px 24px;}
  .btn.small{font-size:16px;padding:8px 18px;margin-top:12px;}
  .cornerbtn,.sbtn{font-size:13px;padding:7px 13px;}
  .pauseicon span{width:30px;height:96px;}
  .pauseword{font-size:clamp(40px,14vw,64px);}
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="pill"><span class="tag">Current Score</span><span id="scoreVal">0</span></div>
  <div class="pill" id="missPill"><span class="tag">Parrots Missed</span><span id="missDots">•••</span></div>
  <div class="pill" id="bestPill"><span class="tag">Best Score</span><span id="bestVal">0</span></div>
</div>

<div class="toast" id="toast"></div>
<button id="pauseBtn" class="cornerbtn" aria-label="Pause">⏸ Pause</button>
<div id="sndbar">
  <button class="sbtn" id="muAll" aria-label="Toggle all sound">🔊 Sound</button>
</div>
<div id="pauseOverlay">
  <div class="pausebox">
    <div class="pauseicon"><span></span><span></span></div>
    <div class="pauseword">Paused</div>
    <div class="pausehint">Tap anywhere to resume</div>
  </div>
</div>

<div class="overlay show" id="nameScreen">
  <div class="scroll">
    <h1>Pirate <span class="r">Parrot</span></h1>
    <p class="sub">Pirate Parrot is going to disclose your location to his master. Stop him before your location is exposed!! You miss three in a row, game over!!</p>
    <div class="namebox">
      <label for="nameInput">Enter yer name to set sail, captain</label>
      <input id="nameInput" type="text" maxlength="16" placeholder="Captain…" autocomplete="off" />
    </div>
    <button class="btn" id="nameGo" disabled>Set sail ⚓</button>
  </div>
</div>

<div class="overlay" id="startScreen">
  <div class="scroll">
    <h1>Pirate <span class="r">Parrot</span></h1>
    <p class="sub" id="menuGreet">Choose yer waters, captain.</p>
    <div class="modes">
      <button class="mode cake" data-mode="cake">
        <span class="mt">Piece of Cake</span>
      </button>
      <button class="mode talkin" data-mode="talkin">
        <span class="mt">Now We're Talkin'!</span>
      </button>
      <button class="mode fu" data-mode="fu">
        <span class="mt">Need bottle of rum!</span>
      </button>
    </div>
    <button class="btn ghost small" id="menuMusic">🎵 Music: On</button>
  </div>
</div>

<div class="overlay" id="overScreen">
  <div class="scroll">
    <p class="modeline" id="overMode"></p>
    <p class="score-label">Birds bagged</p>
    <p class="score-big" id="finalScore">0</p>
    <p class="bestline" id="bestLine"></p>
    <p class="verdict" id="verdict"></p>
    <button class="btn" id="againBtn">Once more</button>
    <button class="btn ghost" id="pickBtn">Back to main menu</button>
  </div>
</div>

<script>
(() => {
"use strict";

/* ============ AUDIO — all synthesized, nothing to download ============ */
const SND = (() => {
  let ac=null, master, musicG, birdG, slingG, noise;
  let muted=false, mMusic=false, mBird=false, mSling=false, running=false, paused=false, step=0, nextT=0;
  const MG=.15, BG=.6, SG=.6;
  const BPM=96, E=60/BPM/2;
  const hz = n => 440*Math.pow(2,(n-69)/12);
  // "Dead Man's Chest" style shanty (Dm): verse + "yo-ho-ho, bottle of rum" refrain
  const MEL=[69,69,69,69, 74,72,69,0, 74,0,72,0, 69,67,65,62,
             70,70,69,69, 74,72,70,0, 74,0,72,0, 69,67,65,62];
  const CHORD=[[62,65,69],[57,61,64],[58,62,65],[57,61,64]]; // Dm  A  Bb  A
  const BROOT=[50,45,46,45];

  function init(){
    if(ac) return;
    const AC=window.AudioContext||window.webkitAudioContext;
    ac=new AC();
    master=ac.createGain(); master.gain.value=.9; master.connect(ac.destination);
    musicG=ac.createGain(); musicG.gain.value=mMusic?0:MG; musicG.connect(master);
    birdG=ac.createGain();  birdG.gain.value =mBird?0:BG;  birdG.connect(master);
    slingG=ac.createGain(); slingG.gain.value=mSling?0:SG; slingG.connect(master);
    noise=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
    const d=noise.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  }
  function tone(n,t,dur,type,vol,dest){
    const o=ac.createOscillator(); o.type=type; o.frequency.value=hz(n);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+.012);
    g.gain.exponentialRampToValueAtTime(.0006,t+dur);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t+dur+.03);
  }
  function kick(t,vol){
    const o=ac.createOscillator(); o.type="sine";
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+.12);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+.006);
    g.gain.exponentialRampToValueAtTime(.0008,t+.18);
    o.connect(g); g.connect(musicG); o.start(t); o.stop(t+.2);
  }
  function snare(t,vol){
    const s=ac.createBufferSource(); s.buffer=noise;
    const f=ac.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1900; f.Q.value=.7;
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+.005);
    g.gain.exponentialRampToValueAtTime(.0006,t+.14);
    s.connect(f); f.connect(g); g.connect(musicG); s.start(t); s.stop(t+.16);
  }
  function bodhran(t,vol){ // frame drum — low woody pulse
    const o=ac.createOscillator(); o.type="sine";
    o.frequency.setValueAtTime(95,t); o.frequency.exponentialRampToValueAtTime(58,t+.1);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+.005);
    g.gain.exponentialRampToValueAtTime(.0008,t+.16);
    o.connect(g); g.connect(musicG); o.start(t); o.stop(t+.18);
    const s=ac.createBufferSource(); s.buffer=noise;
    const f=ac.createBiquadFilter(); f.type="bandpass"; f.frequency.value=420; f.Q.value=1.2;
    const sg=ac.createGain(); sg.gain.setValueAtTime(vol*.5,t); sg.gain.exponentialRampToValueAtTime(.0005,t+.06);
    s.connect(f); f.connect(sg); sg.connect(musicG); s.start(t); s.stop(t+.08);
  }
  function tamb(t,v){ // tambourine shimmer
    const s=ac.createBufferSource(); s.buffer=noise;
    const f=ac.createBiquadFilter(); f.type="highpass"; f.frequency.value=6500;
    const g=ac.createGain(); g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.0004,t+.05);
    s.connect(f); f.connect(g); g.connect(musicG); s.start(t); s.stop(t+.06);
  }
  function vaccordion(notes,t,dur,vol){ // tavern accordion chord
    const f=ac.createBiquadFilter(); f.type="lowpass"; f.frequency.value=1700; f.Q.value=.5;
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+.03);
    g.gain.setValueAtTime(vol,t+dur*.7);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    f.connect(g); g.connect(musicG);
    for(const n of notes){
      const o=ac.createOscillator(); o.type="sawtooth"; o.frequency.value=hz(n);
      const d=ac.createOscillator(); d.type="sawtooth"; d.frequency.value=hz(n)*1.008;
      o.connect(f); d.connect(f);
      o.start(t); d.start(t); o.stop(t+dur+.02); d.stop(t+dur+.02);
    }
  }
  function vchoir(n,t,dur,vol){ // gang-vocal "ahh"
    const f=ac.createBiquadFilter(); f.type="lowpass"; f.frequency.value=1300; f.Q.value=.8;
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+.04);
    g.gain.setValueAtTime(vol,t+dur*.65);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    f.connect(g); g.connect(musicG);
    const o1=ac.createOscillator(); o1.type="sawtooth"; o1.frequency.value=hz(n);
    const o2=ac.createOscillator(); o2.type="sawtooth"; o2.frequency.value=hz(n)*1.012;
    const o3=ac.createOscillator(); o3.type="triangle"; o3.frequency.value=hz(n)*0.5;
    const l=ac.createOscillator(); l.type="sine"; l.frequency.value=4.8;
    const lg=ac.createGain(); lg.gain.value=hz(n)*0.005;
    l.connect(lg); lg.connect(o1.frequency); lg.connect(o2.frequency);
    o1.connect(f); o2.connect(f); o3.connect(f);
    o1.start(t); o2.start(t); o3.start(t); l.start(t);
    o1.stop(t+dur+.03); o2.stop(t+dur+.03); o3.stop(t+dur+.03); l.stop(t+dur+.03);
  }
  function emit(i,t){
    if(paused) return;
    i%=32;
    const bar=(i>>3)&3, beat=i%8;
    if(beat===0||beat===4) kick(t,.7);
    if(beat===2||beat===6){ snare(t,.3); tamb(t,.05); }
    bodhran(t, beat%2===0 ? .3 : .16);
    if(beat%2===0) tone(BROOT[bar], t, E*0.95, "triangle", .5, musicG);
    if(beat===0) vaccordion(CHORD[bar], t, E*3.6, .12);
    if(beat===4) vaccordion(CHORD[bar], t, E*1.7, .09);
    if(MEL[i]>0){ vchoir(MEL[i], t, E*1.15, .17); vchoir(MEL[i]-12, t, E*1.15, .08); }
  }
  function pump(){ while(nextT<ac.currentTime+.12){ emit(step,nextT); nextT+=E; step++; } }

  function sling(){ // elastic snap + airy whoosh
    init(); const t=ac.currentTime;
    const o=ac.createOscillator(); o.type="triangle";
    o.frequency.setValueAtTime(440,t);
    o.frequency.exponentialRampToValueAtTime(120,t+.12);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.4,t+.01);
    g.gain.exponentialRampToValueAtTime(.001,t+.16);
    o.connect(g); g.connect(slingG); o.start(t); o.stop(t+.18);
    const s=ac.createBufferSource(); s.buffer=noise;
    const f=ac.createBiquadFilter(); f.type="bandpass"; f.Q.value=.8;
    f.frequency.setValueAtTime(900,t);
    f.frequency.exponentialRampToValueAtTime(2600,t+.18);
    const ng=ac.createGain();
    ng.gain.setValueAtTime(.0001,t);
    ng.gain.exponentialRampToValueAtTime(.22,t+.02);
    ng.gain.exponentialRampToValueAtTime(.001,t+.2);
    s.connect(f); f.connect(ng); ng.connect(slingG); s.start(t); s.stop(t+.22);
  }
  function thwack(){ // parrot hit
    init(); const t=ac.currentTime;
    const s=ac.createBufferSource(); s.buffer=noise;
    const f=ac.createBiquadFilter(); f.type="lowpass";
    f.frequency.setValueAtTime(2600,t);
    f.frequency.exponentialRampToValueAtTime(350,t+.16);
    const g=ac.createGain();
    g.gain.setValueAtTime(.85,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.2);
    s.connect(f); f.connect(g); g.connect(slingG); s.start(t); s.stop(t+.22);
    const o=ac.createOscillator(); o.type="square";
    o.frequency.setValueAtTime(240,t);
    o.frequency.exponentialRampToValueAtTime(52,t+.17);
    const og=ac.createGain();
    og.gain.setValueAtTime(.5,t);
    og.gain.exponentialRampToValueAtTime(.001,t+.19);
    o.connect(og); og.connect(slingG); o.start(t); o.stop(t+.21);
  }
  function squawk(){ // dying parrot cry
    init(); const t=ac.currentTime+.02;
    const o=ac.createOscillator(); o.type="sawtooth";
    o.frequency.setValueAtTime(980,t);
    o.frequency.exponentialRampToValueAtTime(150,t+.36);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.3,t+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+.4);
    const l=ac.createOscillator(); l.type="sine"; l.frequency.value=21;
    const lg=ac.createGain(); lg.gain.value=50;
    l.connect(lg); lg.connect(o.frequency);
    o.connect(g); g.connect(birdG);
    o.start(t); o.stop(t+.42); l.start(t); l.stop(t+.42);
  }
  function splash(){
    init(); const t=ac.currentTime;
    const s=ac.createBufferSource(); s.buffer=noise;
    const f=ac.createBiquadFilter(); f.type="bandpass"; f.Q.value=.7;
    f.frequency.setValueAtTime(650,t);
    f.frequency.exponentialRampToValueAtTime(2800,t+.15);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.5,t+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+.42);
    s.connect(f); f.connect(g); g.connect(slingG); s.start(t); s.stop(t+.44);
  }
  function thunder(){ // low rumble for lightning
    init(); const t=ac.currentTime;
    const s=ac.createBufferSource(); s.buffer=noise; s.loop=true;
    const f=ac.createBiquadFilter(); f.type="lowpass";
    f.frequency.setValueAtTime(230,t);
    f.frequency.exponentialRampToValueAtTime(60,t+1.2);
    const g=ac.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.linearRampToValueAtTime(.45,t+.09);
    g.gain.exponentialRampToValueAtTime(.001,t+1.4);
    s.connect(f); f.connect(g); g.connect(slingG); s.start(t); s.stop(t+1.5);
    const o=ac.createOscillator(); o.type="sine";
    o.frequency.setValueAtTime(50,t);
    o.frequency.exponentialRampToValueAtTime(27,t+1.2);
    const og=ac.createGain();
    og.gain.setValueAtTime(.0001,t);
    og.gain.linearRampToValueAtTime(.4,t+.12);
    og.gain.exponentialRampToValueAtTime(.001,t+1.3);
    o.connect(og); og.connect(slingG); o.start(t); o.stop(t+1.4);
  }

  function chirp(){ // friendly parrot call (occasional)
    init(); const t0=ac.currentTime;
    const n=2+Math.floor(Math.random()*2);
    for(let k=0;k<n;k++){
      const tt=t0+k*0.12;
      const f0=620+Math.random()*360;
      const o=ac.createOscillator(); o.type="sawtooth";
      o.frequency.setValueAtTime(f0,tt);
      o.frequency.exponentialRampToValueAtTime(f0*0.58,tt+.1);
      const g=ac.createGain();
      g.gain.setValueAtTime(.0001,tt);
      g.gain.exponentialRampToValueAtTime(.15,tt+.012);
      g.gain.exponentialRampToValueAtTime(.001,tt+.12);
      const l=ac.createOscillator(); l.type="sine"; l.frequency.value=27;
      const lg=ac.createGain(); lg.gain.value=32;
      l.connect(lg); lg.connect(o.frequency);
      o.connect(g); g.connect(birdG);
      o.start(tt); o.stop(tt+.14); l.start(tt); l.stop(tt+.14);
    }
  }

  return {
    start(){ init(); if(ac.state==="suspended") ac.resume(); paused=false;
      if(!running){ running=true; nextT=ac.currentTime+.08; setInterval(pump,25); } },
    setPaused(p){ paused=p; },
    sling, thwack, squawk, splash, thunder, chirp,
    toggleMute(){ if(!ac) return muted; muted=!muted;
      master.gain.setTargetAtTime(muted?0:.9, ac.currentTime,.02); return muted; },
    toggleMusic(){ mMusic=!mMusic; if(musicG) musicG.gain.setTargetAtTime(mMusic?0:MG, ac.currentTime,.02); return mMusic; },
    toggleBird(){ mBird=!mBird; if(birdG) birdG.gain.setTargetAtTime(mBird?0:BG, ac.currentTime,.02); return mBird; },
    toggleSling(){ mSling=!mSling; if(slingG) slingG.gain.setTargetAtTime(mSling?0:SG, ac.currentTime,.02); return mSling; }
  };
})();

/* ============ CANVAS & WORLD ============ */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
let W=0,H=0,DPR=1, oceanY=0, boat, sling;

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=innerWidth; H=innerHeight;
  canvas.width=W*DPR|0; canvas.height=H*DPR|0;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const portrait = H>=W;
  oceanY = H*(portrait?.70:.64);
  const bw = Math.min(portrait?W*0.52:W*0.32, 240);
  boat={x:W*.5, deckY:oceanY+4, w:bw};
  sling={x:boat.x, y:boat.deckY - boat.w*0.18 - 14,
         maxStretch:Math.max(90, Math.min(portrait?180:160, W*(portrait?0.36:0.24)))};
  makeClouds(); makeRain();
  if(!aiming){ pull.x=sling.x; pull.y=sling.y; }
}

/* ============ MODES ============ */
const MODES={
  cake:   {id:"cake",   name:"Piece of Cake",     hard:false, weather:"day"},
  talkin: {id:"talkin", name:"Now We're Talkin'!", hard:true,  weather:"day"},
  fu:     {id:"fu",     name:"Need bottle of rum!", hard:true,  weather:"storm"}
};
let mode=MODES.cake;

/* ============ CONSTANTS / STATE ============ */
const GRAV=820, POWER=9, MIN_STRETCH=14, RELOAD=0.45;
const PR=26; // parrot hit radius
let state="start", score=0, best=0, streakMiss=0;
let balls=[], parrot=null, respawnIn=0, fx=[], clouds=[], waveT=0;
let loaded=true, reloadT=0, aiming=false;
const pull={x:0,y:0};
let rain=[], lightning=0, nextBolt=4, boltX=0;
let rainBaseN=0, rainActive=0, rainMul=1, rainTarget=1, nextGust=6, gustT=0;
const rand=(a,b)=>a+Math.random()*(b-a);
let playerName=(function(){ try{ return localStorage.getItem('ppName')||""; }catch(e){ return ""; } })();
let musicOff=false;

function makeClouds(){
  clouds=[];
  const n = mode.weather==="storm" ? 6 : 4;
  for(let i=0;i<n;i++)
    clouds.push({x:rand(0,W),y:rand(40,oceanY*.5),s:rand(.7,1.35),v:rand(7,17)});
}
function makeRain(){
  rain=[];
  if(mode.weather!=="storm"){ rainBaseN=0; rainActive=0; return; }
  rainBaseN=Math.round(W/3.4);
  const cap=Math.round(rainBaseN*2.4);
  for(let i=0;i<cap;i++)
    rain.push({x:rand(-60,W),y:rand(-H,oceanY),len:rand(14,26),
               vx:rand(-170,-110),vy:rand(780,1120)});
  rainMul=1; rainTarget=1; nextGust=rand(4,9); gustT=0; rainActive=rainBaseN;
}

function spawnParrot(){
  const sw=Math.min(1, W/1100)*.55+.45;
  let d, reverse;
  if(mode.hard){
    d=Math.min(1, 0.55 + score*0.02);
    reverse=true;
  } else {
    d=Math.min(0.35, score*0.015);
    reverse=false;
  }
  let v=rand(330+210*d, 580+250*d)*sw;
  if(Math.random()<.22) v*=1.32;
  if(mode.hard) v*=1.25;
  const baseY=rand(60, oceanY*.5);
  parrot={
    x:-70, baseY, y:baseY, vx:v, dir:1, face:1,
    amp:rand(10,20)+(mode.hard?56:36)*d, wf:rand(1.5,2.7), ph:rand(0,6.28),
    tilt:0, flap:rand(0,6.28), alive:true,
    reverse, nextJuke: reverse?rand(.5,1.4):Infinity, jukeT:0,
    jukesLeft: reverse?(2+Math.floor(Math.random()*3)):0,
    nextChirp: rand(.5,2.4)
  };
}

/* ============ FLOW ============ */
const $=id=>document.getElementById(id);
const scoreVal=$("scoreVal"), bestVal=$("bestVal"), missPill=$("missPill"), missDots=$("missDots");

function bestKey(){ return "ppBest_"+mode.id; }
function loadBest(){ try{ return parseInt(localStorage.getItem(bestKey()))||0; }catch(e){ return 0; } }
function saveBest(v){ try{ localStorage.setItem(bestKey(), String(v)); }catch(e){} }

function updateStrikes(){
  let s="";
  for(let i=0;i<3;i++) s += i<streakMiss ? "✕" : "•";
  missDots.textContent=s;
  missPill.classList.toggle("danger", streakMiss>=2);
}

function resetGame(){
  score=0; streakMiss=0; balls=[]; fx=[]; respawnIn=0;
  loaded=true; reloadT=0; aiming=false;
  pull.x=sling.x; pull.y=sling.y;
  lightning=0; nextBolt=rand(3,6);
  best=loadBest();
  makeClouds(); makeRain(); spawnParrot();
  scoreVal.textContent="0"; bestVal.textContent=best;
  updateStrikes();
}

function startGame(modeId){
  mode = MODES[modeId] || mode;
  if(!playerName) playerName="Captain";
  SND.start();
  $("startScreen").classList.remove("show");
  $("overScreen").classList.remove("show");
  $("pauseOverlay").classList.remove("show");
  $("hud").classList.add("show");
  resetGame(); state="playing";
  $("pauseBtn").classList.add("on");
  $("sndbar").classList.add("on");
}

function endGame(){
  state="over";
  $("hud").classList.remove("show");
  $("pauseBtn").classList.remove("on");
  $("sndbar").classList.remove("on");
  $("pauseOverlay").classList.remove("show");
  aiming=false;
  if(score>best){ best=score; saveBest(best); }
  $("overMode").textContent=mode.name;
  $("finalScore").textContent=score;
  const bl=$("bestLine");
  if(score===best && score>0){ bl.textContent="A new personal best, "+playerName+"!"; bl.classList.add("new"); }
  else { bl.textContent=playerName+"'s best: "+best; bl.classList.remove("new"); }
  const v=$("verdict");
  if(score===0) v.textContent="Not a feather ruffled. The parrots drink to your health.";
  else if(score<=4) v.textContent="A few squawks silenced. The flock takes notice.";
  else if(score<=9) v.textContent="A steady hand on a rolling deck. Well shot.";
  else if(score<=15) v.textContent="Deadeye of the cove. Birds whisper your name.";
  else v.textContent="Legend of the seven skies. Strike your own flag!";
  $("overScreen").classList.add("show");
}

function togglePause(){
  if(state==="playing"){ state="paused"; SND.setPaused(true); $("pauseOverlay").classList.add("show"); }
  else if(state==="paused"){ state="playing"; SND.setPaused(false); $("pauseOverlay").classList.remove("show"); }
}

let toastT=null;
function toast(m){
  const el=$("toast"); el.textContent=m; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1100);
}

/* ============ SLING INPUT (drag to aim, Angry-Birds style) ============ */
function boatBobTilt(){ const a=Math.sin(waveT*1.6); return {bob:a*2.5, tilt:a*0.02}; }
function slingAnchor(){
  const {bob,tilt}=boatBobTilt();
  const lx=sling.x-boat.x, ly=sling.y-boat.deckY;
  const c=Math.cos(tilt), s=Math.sin(tilt);
  return { x: boat.x + lx*c - ly*s, y: boat.deckY+bob + lx*s + ly*c, tilt };
}
function setPull(cx,cy){
  const r=canvas.getBoundingClientRect();
  const a=slingAnchor();
  let px=cx-r.left, py=cy-r.top;
  let dx=px-a.x, dy=py-a.y;
  const d=Math.hypot(dx,dy), m=sling.maxStretch;
  if(d>m){ dx=dx/d*m; dy=dy/d*m; }
  pull.x=a.x+dx; pull.y=a.y+dy;
}
function release(){
  const a=slingAnchor();
  const dx=a.x-pull.x, dy=a.y-pull.y;
  if(Math.hypot(dx,dy)<MIN_STRETCH){ return; }
  SND.sling();
  balls.push({x:a.x, y:a.y, vx:dx*POWER, vy:dy*POWER, life:4});
  loaded=false; reloadT=RELOAD;
}
canvas.addEventListener("pointerdown",e=>{
  if(state!=="playing"||!loaded) return;
  aiming=true; setPull(e.clientX,e.clientY);
});
addEventListener("pointermove",e=>{ if(aiming) setPull(e.clientX,e.clientY); });
addEventListener("pointerup",()=>{ if(aiming){ aiming=false; release(); } });
addEventListener("pointercancel",()=>{ if(aiming){ aiming=false; pull.x=sling.x; pull.y=sling.y; } });

/* keyboard: mute / pause / replay */
addEventListener("keydown",e=>{
  if(e.target && e.target.tagName==="INPUT") return;
  const k=e.key;
  if(k==="m"||k==="M"){ const off=SND.toggleMute(); setAllSound(off); toast(off?"Sound off":"Sound on"); return; }
  if((state==="playing"||state==="paused") && k==="Enter"){ e.preventDefault(); togglePause(); return; }
  if(state==="over" && (k==="r"||k==="R"||k==="Enter")){ startGame(mode.id); }
});

document.querySelectorAll(".mode").forEach(b=>{
  b.addEventListener("click",()=>startGame(b.dataset.mode));
});
$("againBtn").addEventListener("click",()=>startGame(mode.id));
$("pickBtn").addEventListener("click",()=>{
  state="start";
  $("overScreen").classList.remove("show");
  $("startScreen").classList.add("show");
});
function showMenu(){
  $("nameScreen").classList.remove("show");
  $("startScreen").classList.add("show");
  $("menuGreet").textContent="Choose yer waters, Captain "+playerName+"!";
  SND.start();
  $("menuMusic").textContent = musicOff ? "🎵 Music: Off" : "🎵 Music: On";
}
function commitName(){
  const nm=($("nameInput").value||"").trim();
  if(!nm){ $("nameInput").focus(); return; }
  playerName=nm; try{ localStorage.setItem('ppName',nm); }catch(e){}
  showMenu();
}
$("nameInput").addEventListener("input",()=>{ $("nameGo").disabled=!$("nameInput").value.trim(); });
$("nameInput").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); commitName(); } });
$("nameGo").addEventListener("click",e=>{ e.preventDefault(); commitName(); });
$("menuMusic").addEventListener("click",e=>{ e.preventDefault();
  musicOff=SND.toggleMusic();
  $("menuMusic").textContent = musicOff ? "🎵 Music: Off" : "🎵 Music: On";
});
$("pauseBtn").addEventListener("click",e=>{ e.preventDefault(); if(state==="playing"||state==="paused") togglePause(); });
$("pauseOverlay").addEventListener("click",()=>{ if(state==="paused") togglePause(); });
function setAllSound(off){ const b=$("muAll"); b.classList.toggle("off",off); b.textContent=off?"🔇 Sound":"🔊 Sound"; }
$("muAll").addEventListener("click",e=>{ e.preventDefault(); setAllSound(SND.toggleMute()); });

/* ============ UPDATE ============ */
function update(dt){
  waveT+=dt;
  for(const c of clouds){
    c.x+=c.v*dt;
    if(c.x-100*c.s>W){ c.x=-100*c.s; c.y=rand(40,oceanY*.5); }
  }
  if(mode.weather==="storm"){
    // random gusts: bursts of faster, heavier rain
    nextGust-=dt;
    if(nextGust<=0 && gustT<=0){ gustT=rand(1.4,3.4); rainTarget=rand(1.7,2.4); nextGust=rand(6,13); }
    if(gustT>0){ gustT-=dt; if(gustT<=0) rainTarget=1; }
    rainMul += (rainTarget-rainMul)*Math.min(1,dt*3);
    rainActive=Math.min(rain.length, Math.round(rainBaseN*rainMul));
    for(let i=0;i<rainActive;i++){
      const d=rain[i];
      d.x+=d.vx*rainMul*dt; d.y+=d.vy*rainMul*dt;
      if(d.y>H+20){ d.y=-20; d.x=rand(0,W+80); d.vy=rand(780,1120); d.len=rand(14,26); }
      if(d.x<-80){ d.x=W+rand(0,80); }
    }
    if(state==="playing"){
      nextBolt-=dt;
      if(nextBolt<=0){ lightning=1; boltX=rand(W*.2,W*.8); nextBolt=rand(3.5,8); SND.thunder(); }
    }
    lightning=Math.max(0,lightning-dt*2.0);
  }

  if(state!=="playing") return;

  if(!loaded){ reloadT-=dt; if(reloadT<=0){ loaded=true; pull.x=sling.x; pull.y=sling.y; } }

  if(parrot&&parrot.alive){
    if(parrot.reverse){
      if(parrot.jukeT>0){
        parrot.jukeT-=dt;
        if(parrot.jukeT<=0) parrot.dir=1;
      } else if(parrot.jukesLeft>0){
        parrot.nextJuke-=dt;
        if(parrot.nextJuke<=0 && parrot.x>80 && parrot.x<W-120){
          parrot.dir=-1; parrot.jukeT=rand(.4,.9); parrot.jukesLeft--;
          parrot.nextJuke=rand(.8,1.8);
        }
      }
    }
    const vx=parrot.vx*(parrot.dir===-1?-0.7:1);
    parrot.face = parrot.dir===-1 ? -1 : 1;
    parrot.x+=vx*dt;
    parrot.ph+=dt*parrot.wf;
    const ny=parrot.baseY+Math.sin(parrot.ph)*parrot.amp;
    parrot.tilt=(ny-parrot.y)*.05;
    parrot.y=ny;
    parrot.flap+=dt*11.5;
    parrot.nextChirp-=dt;
    if(parrot.nextChirp<=0){ SND.chirp(); parrot.nextChirp=rand(1.8,4.4); }
    if(parrot.x-80>W) missBird();
  } else if(!parrot){
    respawnIn-=dt;
    if(respawnIn<=0) spawnParrot();
  }

  for(const b of balls){
    b.vy+=GRAV*dt; b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if(parrot&&parrot.alive){
      const dx=b.x-parrot.x, dy=b.y-parrot.y;
      if(dx*dx+dy*dy<(PR+5)*(PR+5)){ kill(parrot); b.life=0; }
    }
    if(b.life>0 && b.y>=oceanY-2 && b.vy>0){ splashFx(b.x,oceanY-2); b.life=0; }
  }
  balls=balls.filter(b=>b.life>0&&b.y<H+60&&b.x>-60&&b.x<W+60);

  for(const f of fx){
    f.vy+=(f.g??520)*dt; f.x+=f.vx*dt; f.y+=f.vy*dt;
    f.rot+=(f.vr||0)*dt; f.life-=dt;
    if(f.type==="body"&&!f.splashed&&f.y>=oceanY-4){
      f.splashed=true; f.life=0; splashFx(f.x,oceanY-4);
    }
    if(f.type==="wing"&&f.y>=oceanY-2){ f.vy*=-.18; f.vx*=.6; f.g=120; }
  }
  fx=fx.filter(f=>f.life>0);
}

function kill(p){
  score++; scoreVal.textContent=score;
  if(score>best){ best=score; bestVal.textContent=best; saveBest(best); }
  streakMiss=0; updateStrikes();
  SND.thwack(); SND.squawk();
  p.alive=false;
  const x=p.x,y=p.y;
  for(let s=-1;s<=1;s+=2)
    fx.push({type:"wing",x,y,vx:s*rand(60,150)+p.vx*.2,vy:rand(-190,-60),
             rot:rand(-.6,.6),vr:s*rand(3,6),g:520,life:3});
  for(let i=0;i<6;i++)
    fx.push({type:"feather",x,y,vx:rand(-140,140),vy:rand(-170,-30),
             rot:rand(0,6.28),vr:rand(-5,5),g:300,life:1.6,hue:i%3});
  fx.push({type:"body",x,y,vx:p.vx*.45,vy:rand(-120,-40),rot:0,vr:rand(2,4),g:570,life:5});
  parrot=null; respawnIn=mode.hard?.35:.4;
}

function missBird(){
  parrot=null; respawnIn=mode.hard?.35:.4;
  streakMiss++; updateStrikes();
  if(streakMiss>=3){ endGame(); }
}

function splashFx(x,y){
  SND.splash();
  for(let i=0;i<16;i++){
    const a=rand(-Math.PI*.85,-Math.PI*.15), s=rand(90,330);
    fx.push({type:"drop",x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,rot:0,vr:0,g:680,life:rand(.5,.9),r:rand(2,5)});
  }
}

/* ============ DRAW ============ */
function draw(){
  const storm = mode.weather==="storm";
  drawSky(storm);
  for(const c of clouds) cloud(c.x,c.y,c.s,storm);
  ocean(storm);
  if(parrot&&parrot.alive) drawParrot(parrot);
  drawFx();
  drawBoat();
  drawSling();
  drawBalls();
  drawPreview();
  if(storm){
    ctx.fillStyle="rgba(18,26,46,.18)"; ctx.fillRect(0,0,W,oceanY);
    drawRain();
    if(lightning>.5) drawBolt();
    if(lightning>.02){ ctx.fillStyle=`rgba(222,228,255,${lightning*.4})`; ctx.fillRect(0,0,W,H); }
  }
}

function drawSky(storm){
  const sky=ctx.createLinearGradient(0,0,0,oceanY);
  if(storm){
    sky.addColorStop(0,"#03040c");
    sky.addColorStop(.5,"#070b1c");
    sky.addColorStop(1,"#10162c");
  } else {
    sky.addColorStop(0,"#3b2a63");
    sky.addColorStop(.45,"#c4527a");
    sky.addColorStop(.8,"#f58a4b");
    sky.addColorStop(1,"#ffc06a");
  }
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,oceanY);

  const sx=W*.5, sy=oceanY-26;
  if(storm){
    // pale moon
    const mx=W*.74, my=oceanY*.30, mr=27;
    let g=ctx.createRadialGradient(mx,my,6,mx,my,112);
    g.addColorStop(0,"rgba(228,234,255,.7)");
    g.addColorStop(1,"rgba(228,234,255,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(mx,my,112,0,7); ctx.fill();
    let md=ctx.createRadialGradient(mx-8,my-8,4,mx,my,mr);
    md.addColorStop(0,"#fbfdff"); md.addColorStop(1,"#ccd5ea");
    ctx.fillStyle=md; ctx.beginPath(); ctx.arc(mx,my,mr,0,7); ctx.fill();
    ctx.fillStyle="rgba(150,160,188,.5)";
    [[-9,-7,5],[7,-3,4],[-3,9,6],[11,9,3],[3,-12,3]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc(mx+dx,my+dy,r,0,7); ctx.fill();
    });
    ctx.strokeStyle="rgba(120,130,162,.35)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(mx,my,mr-1,0.25,2.1); ctx.stroke();
  } else {
    let g=ctx.createRadialGradient(sx,sy,8,sx,sy,170);
    g.addColorStop(0,"rgba(255,238,170,.95)");
    g.addColorStop(.35,"rgba(255,190,90,.55)");
    g.addColorStop(1,"rgba(255,160,70,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,170,0,7); ctx.fill();
    ctx.fillStyle="#fff0c0";
    ctx.beginPath(); ctx.arc(sx,sy,46,Math.PI,0); ctx.fill();
  }

  // stars
  ctx.fillStyle="rgba(255,255,255,.7)";
  for(let i=0;i<14;i++){
    const x=(i*97.3)%W, y=((i*53.7)%(oceanY*.3));
    const tw=.4+.6*Math.abs(Math.sin(waveT*1.3+i));
    ctx.globalAlpha=tw*(storm?.85:.7);
    ctx.fillRect(x,y,2,2);
  }
  ctx.globalAlpha=1;
}

function cloud(x,y,s,storm){
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  // lumpy top made of overlapping puffs, flat-ish shaded base — no bright inner spot
  const puffs=[[-48,8,20],[-26,-4,26],[-2,-12,30],[24,-6,26],[48,6,20],[14,10,24],[-18,12,22]];
  const top = storm ? "#5b6072" : "#f3ddc2";
  const mid = storm ? "#474c5e" : "#ecceb0";
  const bot = storm ? "#34384a" : "#dcae8a";
  // base shadow band (flat bottom)
  ctx.fillStyle=bot;
  ctx.beginPath(); ctx.ellipse(0,16,62,15,0,0,7); ctx.fill();
  // mid puffs
  ctx.fillStyle=mid;
  for(const[px,py,r]of puffs){ ctx.beginPath(); ctx.arc(px,py+4,r,0,7); ctx.fill(); }
  // top-lit puffs (slightly higher, lighter)
  ctx.fillStyle=top;
  for(const[px,py,r]of puffs){ ctx.beginPath(); ctx.arc(px,py-2,r*.92,0,7); ctx.fill(); }
  ctx.restore();
}

function ocean(storm){
  const sea=ctx.createLinearGradient(0,oceanY,0,H);
  if(storm){
    sea.addColorStop(0,"#2c3350");
    sea.addColorStop(.3,"#1c2740");
    sea.addColorStop(1,"#0a1325");
  } else {
    sea.addColorStop(0,"#b35a52");
    sea.addColorStop(.25,"#5b4a78");
    sea.addColorStop(1,"#10293f");
  }
  ctx.fillStyle=sea;
  ctx.beginPath(); ctx.moveTo(0,oceanY);
  for(let x=0;x<=W;x+=14){
    const yy=oceanY+Math.sin(x*.025+waveT*1.8)*5+Math.sin(x*.011-waveT*1.1)*4;
    ctx.lineTo(x,yy);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  if(!storm){
    const sunX=W*.5;
    ctx.save(); ctx.lineCap="round";
    for(let i=0;i<9;i++){
      const yy=oceanY+18+i*((H-oceanY)/10);
      const wob=Math.sin(waveT*1.6+i*1.4)*16;
      const wdt=46-i*3;
      ctx.globalAlpha=.5-.04*i;
      ctx.strokeStyle="#ffd98e"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(sunX-wdt/2+wob,yy); ctx.lineTo(sunX+wdt/2+wob,yy); ctx.stroke();
    }
    ctx.restore();
  }
}

function longFeather(x,y,dir,len,wd,col){
  ctx.save(); ctx.translate(x,y); ctx.rotate(dir);
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.quadraticCurveTo(len*.5,-wd, len,0);
  ctx.quadraticCurveTo(len*.5, wd, 0,0);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawParrot(p){
  const flap=Math.sin(p.flap);
  ctx.save();
  ctx.globalAlpha = mode.id==="fu" ? 0.8 : 1;
  ctx.translate(p.x,p.y);
  ctx.scale(p.face,1);
  if(p.tilt) ctx.rotate(Math.max(-.45,Math.min(.45,p.tilt))*p.face);

  // long macaw tail, trailing behind (to the left)
  longFeather(-20,4, Math.PI+0.02, 60, 7, "#1f74d6");
  longFeather(-20,1, Math.PI-0.16, 52, 6, "#e8493f");
  longFeather(-20,7, Math.PI+0.22, 52, 6, "#f3b62b");

  // far wing
  parrotWing(flap*0.8, true);

  // body
  ctx.fillStyle="#e8493f"; ctx.strokeStyle="#a92e2a"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(0,0,24,18,-0.12,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#ff7a5c";
  ctx.beginPath(); ctx.ellipse(2,7,15,11,0,0,7); ctx.fill();

  // head
  ctx.fillStyle="#e8493f";
  ctx.beginPath(); ctx.arc(20,-12,14,0,7); ctx.fill();
  // little crest
  ctx.strokeStyle="#c0392b"; ctx.lineWidth=3; ctx.lineCap="round";
  for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(15+i*4,-24); ctx.lineTo(13+i*5,-33); ctx.stroke(); }
  // white macaw cheek patch
  ctx.fillStyle="#f7f3ea";
  ctx.beginPath(); ctx.ellipse(23,-10,9.5,8.5,0,0,7); ctx.fill();
  ctx.strokeStyle="rgba(170,140,140,.5)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(16,-13); ctx.quadraticCurveTo(26,-12,31,-8); ctx.stroke();
  // eye
  ctx.fillStyle="#1a1018";
  ctx.beginPath(); ctx.arc(24,-12,3.3,0,7); ctx.fill();
  ctx.fillStyle="#fff";
  ctx.beginPath(); ctx.arc(25.2,-13,1.2,0,7); ctx.fill();
  // big hooked beak
  ctx.fillStyle="#23202a";
  ctx.beginPath();
  ctx.moveTo(30,-18);
  ctx.quadraticCurveTo(49,-15,44,-3);
  ctx.quadraticCurveTo(42,3,35,0);
  ctx.quadraticCurveTo(31,-3,30,-18);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle="#3a3543";
  ctx.beginPath(); ctx.moveTo(33,-1); ctx.quadraticCurveTo(41,3,36,6);
  ctx.quadraticCurveTo(31,5,33,-1); ctx.fill();
  ctx.fillStyle="#4a4550";
  ctx.beginPath(); ctx.arc(33,-14,1.3,0,7); ctx.fill();

  // feet tucked
  ctx.strokeStyle="#c98a2b"; ctx.lineWidth=2.4; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(-2,16); ctx.lineTo(1,21);
  ctx.moveTo(7,16); ctx.lineTo(10,21); ctx.stroke();

  // near wing (over body)
  parrotWing(flap, false);
  ctx.restore();

  function parrotWing(a, far){
    ctx.save(); ctx.translate(-2,-6); ctx.rotate(-0.2 - a*0.5); ctx.scale(1, far?.82:1);
    ctx.fillStyle=far?"#0f6fb0":"#1f8fe0";
    ctx.strokeStyle=far?"#0a5688":"#0f6fb0"; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(2,0);
    ctx.quadraticCurveTo(-26,-10,-54,6);
    ctx.quadraticCurveTo(-30,18,2,14);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle=far?"#0a5688":"#0c5c8c"; ctx.lineWidth=1.5;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(-20-i*10,8-i); ctx.lineTo(-46-i*4,6); ctx.stroke(); }
    ctx.fillStyle=far?"#d79a1f":"#f3b62b";
    ctx.beginPath(); ctx.ellipse(-16,7,11,4,.1,0,7); ctx.fill();
    ctx.restore();
  }
}

function drawFx(){
  for(const f of fx){
    ctx.save();
    ctx.globalAlpha=Math.max(0,Math.min(1,f.life*(f.type==="drop"?1.6:.9)));
    ctx.translate(f.x,f.y); ctx.rotate(f.rot||0);
    if(f.type==="wing"){
      ctx.fillStyle="#1f8fe0"; ctx.strokeStyle="#0f6fb0"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(-26,-6,-46,8);
      ctx.quadraticCurveTo(-26,14,0,12); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle="#f3b62b";
      ctx.beginPath(); ctx.ellipse(-12,5,8,4,0,0,7); ctx.fill();
    } else if(f.type==="feather"){
      ctx.fillStyle=["#e8493f","#f3b62b","#1f8fe0"][f.hue];
      ctx.beginPath(); ctx.ellipse(0,0,9,3.4,0,0,7); ctx.fill();
    } else if(f.type==="body"){
      ctx.fillStyle="#e8493f"; ctx.strokeStyle="#a92e2a"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0,0,22,16,0,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle="#ff7a5c";
      ctx.beginPath(); ctx.ellipse(0,5,13,9,0,0,7); ctx.fill();
      ctx.strokeStyle="#21151c"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(8,-6); ctx.lineTo(14,-2);
      ctx.moveTo(14,-6); ctx.lineTo(8,-2); ctx.stroke();
    } else if(f.type==="drop"){
      ctx.fillStyle="rgba(255,225,190,.9)";
      ctx.beginPath(); ctx.arc(0,0,f.r||3,0,7); ctx.fill();
    }
    ctx.restore();
  }
}

function drawBoat(){
  const {bob,tilt}=boatBobTilt();
  ctx.save(); ctx.translate(boat.x,boat.deckY+bob); ctx.rotate(tilt);
  const w=boat.w, h=w*.34;
  ctx.fillStyle="rgba(15,25,45,.35)";
  ctx.beginPath(); ctx.ellipse(0,h*.9,w*.5,10,0,0,7); ctx.fill();
  ctx.fillStyle="#7c4a22"; ctx.strokeStyle="#46280f"; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(-w*.5,-h*.25); ctx.lineTo(w*.5,-h*.25);
  ctx.quadraticCurveTo(w*.5,h*.85,w*.28,h*.85);
  ctx.lineTo(-w*.28,h*.85);
  ctx.quadraticCurveTo(-w*.5,h*.85,-w*.5,-h*.25);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#c98a4a";
  ctx.fillRect(-w*.5,-h*.34,w,h*.12);
  ctx.strokeStyle="#46280f"; ctx.lineWidth=2;
  ctx.strokeRect(-w*.5,-h*.34,w,h*.12);
  ctx.strokeStyle="rgba(70,40,15,.5)"; ctx.lineWidth=2;
  for(let i=1;i<3;i++){
    const yy=-h*.25+i*(h*1.05)/3;
    ctx.beginPath(); ctx.moveTo(-w*.46+i*4,yy); ctx.lineTo(w*.46-i*4,yy); ctx.stroke();
  }
  // mast (flag removed)
  ctx.strokeStyle="#46280f"; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-w*.4,-h*.34); ctx.lineTo(-w*.4,-h*1.35); ctx.stroke();
  ctx.fillStyle="#5e3a1c";
  ctx.beginPath(); ctx.arc(-w*.4,-h*1.35,3.5,0,7); ctx.fill();
  sailor(-w*.24,-h*.34);
  ctx.restore();
}

function sailor(x,y){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle="#8a2f3c";
  ctx.beginPath(); ctx.ellipse(0,-6,9,12,0,0,7); ctx.fill();
  ctx.strokeStyle="#f0dcae"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-7,-8); ctx.lineTo(7,-8);
  ctx.moveTo(-8,-3); ctx.lineTo(8,-3); ctx.stroke();
  ctx.fillStyle="#e9b98c";
  ctx.beginPath(); ctx.arc(0,-20,7,0,7); ctx.fill();
  ctx.fillStyle="#c0392b";
  ctx.beginPath(); ctx.arc(0,-22,7.4,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6,-22); ctx.lineTo(13,-19); ctx.lineTo(7,-18); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawSling(){
  const a=slingAnchor();
  const rock = (state==="playing" && aiming) ? {x:pull.x,y:pull.y} : {x:a.x,y:a.y};
  const forkBaseLen = boat.w*0.18 + 6;
  // fork, rotated with the boat so it rolls alongside it
  ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.tilt);
  ctx.strokeStyle="#5e3a1c"; ctx.lineWidth=7; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(0,forkBaseLen); ctx.lineTo(0,2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,2); ctx.lineTo(-17,-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,2); ctx.lineTo(17,-8); ctx.stroke();
  ctx.strokeStyle="#7c5226"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,forkBaseLen); ctx.lineTo(0,2); ctx.stroke();
  ctx.restore();
  // fork-tip positions in screen space (for the elastic bands)
  const c=Math.cos(a.tilt), s=Math.sin(a.tilt);
  const tip=(lx,ly)=>({x:a.x+lx*c-ly*s, y:a.y+lx*s+ly*c});
  const lTip=tip(-17,-8), rTip=tip(17,-8);
  if(state==="playing" && loaded){
    ctx.strokeStyle="#5b2f17"; ctx.lineWidth=4; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(lTip.x,lTip.y); ctx.lineTo(rock.x-5,rock.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rTip.x,rTip.y); ctx.lineTo(rock.x+5,rock.y); ctx.stroke();
    const g=ctx.createRadialGradient(rock.x-3,rock.y-3,1,rock.x,rock.y,9);
    g.addColorStop(0,"#8a8490"); g.addColorStop(1,"#2a2630");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(rock.x,rock.y,8.5,0,7); ctx.fill();
    ctx.strokeStyle="#15121a"; ctx.lineWidth=1.5; ctx.stroke();
  }
}

function drawPreview(){
  if(!(state==="playing" && aiming)) return;
  const a=slingAnchor();
  const dx=a.x-pull.x, dy=a.y-pull.y;
  if(Math.hypot(dx,dy)<MIN_STRETCH) return;
  let x=a.x, y=a.y, vx=dx*POWER, vy=dy*POWER;
  const stp=0.045;
  ctx.save();
  for(let i=0;i<26;i++){
    vy+=GRAV*stp; x+=vx*stp; y+=vy*stp;
    if(y>oceanY+8 || x<-20 || x>W+20) break;
    ctx.globalAlpha=Math.max(0,.7 - i*.024);
    ctx.fillStyle="#fff3d6";
    ctx.beginPath(); ctx.arc(x,y,Math.max(1.2,4-i*0.09),0,7); ctx.fill();
  }
  ctx.restore();
}

function drawBalls(){
  for(const b of balls){
    ctx.fillStyle="rgba(15,10,20,.25)";
    ctx.beginPath(); ctx.arc(b.x-b.vx*.012,b.y-b.vy*.012,6,0,7); ctx.fill();
    const g=ctx.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,7);
    g.addColorStop(0,"#8a8490"); g.addColorStop(1,"#1b1822");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(b.x,b.y,7,0,7); ctx.fill();
  }
}

function drawRain(){
  ctx.save();
  const op=Math.min(.82, .5 + (rainMul-1)*.28);
  ctx.strokeStyle=`rgba(190,205,235,${op})`; ctx.lineWidth=1.7; ctx.lineCap="round";
  const lf=0.9+(rainMul-1)*0.4;
  for(let i=0;i<rainActive;i++){
    const d=rain[i];
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x - d.vx*0.02, d.y - d.len*lf);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBolt(){
  ctx.save();
  ctx.strokeStyle="rgba(235,240,255,.9)"; ctx.lineWidth=3; ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.shadowColor="rgba(200,215,255,.9)"; ctx.shadowBlur=16;
  let x=boltX, y=0;
  ctx.beginPath(); ctx.moveTo(x,y);
  const segs=6, end=oceanY*0.7;
  for(let i=1;i<=segs;i++){
    y = end*i/segs;
    x = boltX + Math.sin(i*1.7)* (18 + i*4) + rand(-10,10);
    ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

/* ============ LOOP ============ */
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  if(dt>.05) dt=.05;
  update(dt);
  ctx.clearRect(0,0,W,H);
  draw();
  requestAnimationFrame(loop);
}

addEventListener("resize",resize);
resize();
best=loadBest(); bestVal.textContent=best;
$("nameInput").value=playerName;
$("nameGo").disabled=!playerName.trim();
makeClouds(); makeRain(); spawnParrot();
requestAnimationFrame(loop);
})();
</script>
